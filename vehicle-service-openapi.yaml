components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    DealerIdPath:
      name: dealerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BranchIdPath:
      name: branchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanIdPath:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubscriptionIdPath:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VehicleIdPath:
      name: vehicleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ImageIdPath:
      name: imageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ManufacturerIdPath:
      name: manufacturerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ModelIdPath:
      name: modelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VariantIdPath:
      name: variantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LeadIdPath:
      name: leadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SaleRequestIdPath:
      name: saleRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FinanceEnquiryIdPath:
      name: financeEnquiryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
    QueryText:
      name: q
      in: query
      required: false
      schema:
        type: string
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 8
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
    GenericResponse:
      type: object
      additionalProperties: true
      example:
        id: 018f78a0-31b2-7d4a-bd00-09fe6fbb0001
        status: success
    PageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        page:
          type: object
    DealerRequest:
      type: object
      properties:
        dealerName:
          type: string
        dealerSlug:
          type: string
        businessEmail:
          type: string
          format: email
    BranchRequest:
      type: object
      properties:
        branchName:
          type: string
        city:
          type: string
        state:
          type: string
        isPrimary:
          type: boolean
    UserRequest:
      type: object
      properties:
        firstName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
          - owner
          - admin
          - manager
          - sales
          - support
    BrandingRequest:
      type: object
      properties:
        logoUrl:
          type: string
        primaryColor:
          type: string
        customDomain:
          type: string
        subdomain:
          type: string
    PlanRequest:
      type: object
      properties:
        planName:
          type: string
        planCode:
          type: string
        monthlyPrice:
          type: number
    SubscriptionRequest:
      type: object
      properties:
        planId:
          type: string
          format: uuid
        billingCycle:
          type: string
    VehicleRequest:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        registrationNumber:
          type: string
        askingPrice:
          type: number
        kilometersDriven:
          type: integer
    ImageRequest:
      type: object
      properties:
        imageUrl:
          type: string
        imageType:
          type: string
        isPrimary:
          type: boolean
    ConditionReportRequest:
      type: object
      properties:
        exteriorCondition:
          type: string
        interiorCondition:
          type: string
        conditionScore:
          type: integer
    LeadRequest:
      type: object
      properties:
        vehicleId:
          type: string
          format: uuid
        customer:
          type: object
        leadType:
          type: string
    SaleRequest:
      type: object
      properties:
        dealerId:
          type: string
          format: uuid
        customer:
          type: object
        manufacturerName:
          type: string
        modelName:
          type: string
    FinanceRequest:
      type: object
      properties:
        vehicleId:
          type: string
          format: uuid
        customer:
          type: object
        requestedLoanAmount:
          type: number
    SearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        page:
          type: object
        facets:
          type: object
    ReindexRequest:
      type: object
      properties:
        indexName:
          type: string
        reason:
          type: string
tags:
- name: Vehicle Master Data
- name: Vehicles
- name: Vehicle Images
- name: Condition Reports
- name: Vehicle Pricing
- name: Leads
- name: Sale Requests
- name: Finance Enquiries
- name: AI Assistance
