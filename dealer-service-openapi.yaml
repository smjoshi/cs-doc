openapi: 3.1.0
info:
  title: Used Car Dealer Platform - Dealer Service API
  version: 1.0.0
  description: Dealer onboarding, resolution, branches, users, branding, plans, subscriptions, and entitlements.
servers:
- url: https://api.yourplatform.com
