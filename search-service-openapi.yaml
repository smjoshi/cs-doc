openapi: 3.1.0
info:
  title: Used Car Dealer Platform - Search Service API
  version: 1.0.0
  description: Dealer website search, marketplace search, facets, suggestions, and search index administration.
servers:
- url: https://api.yourplatform.com
  description: Production
- url: http://localhost:8082
  description: Local
security:
- bearerAuth: []
paths:
  /api/v1/search/dealers/{dealerId}/vehicles:
    get:
      tags:
      - Dealer Vehicle Search
      summary: Search dealer vehicles
      operationId: searchDealerVehicles
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/DealerIdPath'
      - &id001
        $ref: '#/components/parameters/QueryText'
      - &id002
        $ref: '#/components/parameters/PageQuery'
      - &id003
        $ref: '#/components/parameters/SizeQuery'
      security: []
  /api/v1/search/vehicles/{vehicleId}:
    get:
      tags:
      - Vehicle Search
      summary: Get public vehicle details
      operationId: getPublicVehicleDetails
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/VehicleIdPath'
      security: []
  /api/v1/search/dealers/{dealerId}/featured-vehicles:
    get:
      tags:
      - Dealer Vehicle Search
      summary: Get featured vehicles
      operationId: getDealerFeaturedVehicles
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/DealerIdPath'
      - $ref: '#/components/parameters/LimitQuery'
      security: []
  /api/v1/search/vehicles/{vehicleId}/similar:
    get:
      tags:
      - Vehicle Search
      summary: Get similar vehicles
      operationId: getSimilarVehicles
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/VehicleIdPath'
      - $ref: '#/components/parameters/LimitQuery'
      security: []
  /api/v1/search/dealers/{dealerId}/facets:
    get:
      tags:
      - Facets
      summary: Get dealer facets
      operationId: getDealerFacets
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/DealerIdPath'
      security: []
  /api/v1/search/dealers/{dealerId}/suggestions:
    get:
      tags:
      - Suggestions
      summary: Get dealer suggestions
      operationId: getDealerSuggestions
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/DealerIdPath'
      - $ref: '#/components/parameters/QueryText'
      security: []
  /api/v1/search/vehicles:
    get:
      tags:
      - Marketplace Search
      summary: Search marketplace vehicles
      operationId: searchMarketplaceVehicles
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters: &id004
      - *id001
      - *id002
      - *id003
      security: []
  /api/v1/search/dealers:
    get:
      tags:
      - Marketplace Search
      summary: Search dealers
      operationId: searchDealers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters: *id004
      security: []
  /api/v1/search/suggestions:
    get:
      tags:
      - Suggestions
      summary: Get global suggestions
      operationId: getGlobalSuggestions
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/QueryText'
      security: []
  /api/v1/search-index/vehicles/{vehicleId}/reindex:
    post:
      tags:
      - Search Index Admin
      summary: Reindex vehicle
      operationId: reindexVehicle
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/VehicleIdPath'
  /api/v1/search-index/dealers/{dealerId}/reindex:
    post:
      tags:
      - Search Index Admin
      summary: Reindex dealer
      operationId: reindexDealer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/DealerIdPath'
  /api/v1/search-index/rebuild:
    post:
      tags:
      - Search Index Admin
      summary: Full reindex rebuild
      operationId: rebuildSearchIndex
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReindexRequest'
            examples:
              default:
                value:
                  sample: payload
  /api/v1/search-index/health:
    get:
      tags:
      - Search Index Admin
      summary: Get index health
      operationId: getSearchIndexHealth
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    DealerIdPath:
      name: dealerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BranchIdPath:
      name: branchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanIdPath:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubscriptionIdPath:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VehicleIdPath:
      name: vehicleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ImageIdPath:
      name: imageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ManufacturerIdPath:
      name: manufacturerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ModelIdPath:
      name: modelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VariantIdPath:
      name: variantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LeadIdPath:
      name: leadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SaleRequestIdPath:
      name: saleRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FinanceEnquiryIdPath:
      name: financeEnquiryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
    SizeQuery:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
    QueryText:
      name: q
      in: query
      required: false
      schema:
        type: string
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 8
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
    GenericResponse:
      type: object
      additionalProperties: true
      example:
        id: 018f78a0-31b2-7d4a-bd00-09fe6fbb0001
        status: success
    PageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        page:
          type: object
    DealerRequest:
      type: object
      properties:
        dealerName:
          type: string
        dealerSlug:
          type: string
        businessEmail:
          type: string
          format: email
    BranchRequest:
      type: object
      properties:
        branchName:
          type: string
        city:
          type: string
        state:
          type: string
        isPrimary:
          type: boolean
    UserRequest:
      type: object
      properties:
        firstName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
          - owner
          - admin
          - manager
          - sales
          - support
    BrandingRequest:
      type: object
      properties:
        logoUrl:
          type: string
        primaryColor:
          type: string
        customDomain:
          type: string
        subdomain:
          type: string
    PlanRequest:
      type: object
      properties:
        planName:
          type: string
        planCode:
          type: string
        monthlyPrice:
          type: number
    SubscriptionRequest:
      type: object
      properties:
        planId:
          type: string
          format: uuid
        billingCycle:
          type: string
    VehicleRequest:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        registrationNumber:
          type: string
        askingPrice:
          type: number
        kilometersDriven:
          type: integer
    ImageRequest:
      type: object
      properties:
        imageUrl:
          type: string
        imageType:
          type: string
        isPrimary:
          type: boolean
    ConditionReportRequest:
      type: object
      properties:
        exteriorCondition:
          type: string
        interiorCondition:
          type: string
        conditionScore:
          type: integer
    LeadRequest:
      type: object
      properties:
        vehicleId:
          type: string
          format: uuid
        customer:
          type: object
        leadType:
          type: string
    SaleRequest:
      type: object
      properties:
        dealerId:
          type: string
          format: uuid
        customer:
          type: object
        manufacturerName:
          type: string
        modelName:
          type: string
    FinanceRequest:
      type: object
      properties:
        vehicleId:
          type: string
          format: uuid
        customer:
          type: object
        requestedLoanAmount:
          type: number
    SearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        page:
          type: object
        facets:
          type: object
    ReindexRequest:
      type: object
      properties:
        indexName:
          type: string
        reason:
          type: string
tags:
- name: Dealer Vehicle Search
- name: Vehicle Search
- name: Facets
- name: Suggestions
- name: Marketplace Search
- name: Search Index Admin
